<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1c14"/>
      <stop offset="0.55" stop-color="#1c7a37"/>
      <stop offset="1" stop-color="#0f1c14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#41c463" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#41c463" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#41c463"/>
      <stop offset="1" stop-color="#1c7a37"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative swooshes on the right, echoing the business card -->
  <path d="M1200 0 Q 780 315 1200 630 L1200 0 Z" fill="#0f1c14" opacity="0.55"/>
  <path d="M1200 60 Q 840 315 1200 570" stroke="url(#swoosh)" stroke-width="26" fill="none" opacity="0.9"/>
  <path d="M1200 120 Q 900 315 1200 510" stroke="#41c463" stroke-width="10" fill="none" opacity="0.6"/>

  <!-- big flower on the right -->
  <g transform="translate(980,315)" fill="#41c463">
    <g transform="scale(1.7)">
      <ellipse cx="0" cy="-52" rx="26" ry="52"/>
      <ellipse cx="0" cy="52" rx="26" ry="52"/>
      <ellipse cx="-52" cy="0" rx="52" ry="26"/>
      <ellipse cx="52" cy="0" rx="52" ry="26"/>
      <ellipse cx="-37" cy="-37" rx="26" ry="52" transform="rotate(45 -37 -37)"/>
      <ellipse cx="37" cy="37" rx="26" ry="52" transform="rotate(45 37 37)"/>
      <ellipse cx="37" cy="-37" rx="52" ry="26" transform="rotate(45 37 -37)"/>
      <ellipse cx="-37" cy="37" rx="52" ry="26" transform="rotate(45 -37 37)"/>
    </g>
    <circle cx="0" cy="0" r="26" fill="#0f1c14"/>
  </g>

  <!-- text block -->
  <g transform="translate(90,0)">
    <!-- eyebrow pill -->
    <rect x="0" y="120" rx="20" ry="20" width="360" height="40" fill="#41c463" fill-opacity="0.16" stroke="#41c463" stroke-opacity="0.4"/>
    <text x="24" y="146" fill="#7fe39a" font-size="20" font-weight="700" letter-spacing="3">ILLINOIS &amp; ST. LOUIS AREA</text>

    <!-- brand -->
    <text x="0" y="250" fill="#ffffff" font-size="96" font-weight="800" letter-spacing="14">RAQQA</text>
    <text x="4" y="298" fill="#d8f5e0" font-size="34" font-weight="500" letter-spacing="6">LANDSCAPING SERVICES</text>

    <!-- tagline -->
    <text x="0" y="392" fill="#41c463" font-size="52" font-weight="800">Best in the Midwest</text>
    <text x="0" y="446" fill="#cfe9d6" font-size="30" font-weight="400">Lawn care · Retaining walls · Patios · Mulch · Ponds &amp; more</text>

    <!-- phone / cta -->
    <rect x="0" y="486" rx="30" ry="30" width="470" height="64" fill="#2fa84f"/>
    <text x="235" y="527" fill="#ffffff" font-size="30" font-weight="700" text-anchor="middle">📞 (314) 484-8038 · Free Estimates</text>
  </g>
</svg>
